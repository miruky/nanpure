<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ナンプレ">
  <title>ナンプレ</title>
  <style>
    .frame { stroke: #1b2230; }
    .grid { stroke: #8d97a8; }
    .accent { fill: #3b5bdb; }
    @media (prefers-color-scheme: dark) {
      .frame { stroke: #e8ecf4; }
      .grid { stroke: #4a5568; }
      .accent { fill: #7c93f7; }
    }
  </style>
  <rect class="frame" x="3" y="3" width="26" height="26" rx="6" fill="none" stroke-width="2.4" />
  <g class="grid" stroke-width="1.6" stroke-linecap="round">
    <line x1="11.7" y1="5.5" x2="11.7" y2="26.5" />
    <line x1="20.3" y1="5.5" x2="20.3" y2="26.5" />
    <line x1="5.5" y1="11.7" x2="26.5" y2="11.7" />
    <line x1="5.5" y1="20.3" x2="26.5" y2="20.3" />
  </g>
  <rect class="accent" x="21.3" y="4.8" width="5.9" height="5.9" rx="1.8" />
</svg>
